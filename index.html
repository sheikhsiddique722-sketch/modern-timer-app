<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>Nova Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Ambient background -->
  <div class="ambient-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-overlay"></div>
  </div>

  <!-- Notification popup -->
  <div class="notification" id="notification">
    <div class="notification-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
        <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
      </svg>
    </div>
    <div class="notification-content">
      <div class="notification-title">Time's Up!</div>
      <div class="notification-message">Your timer has finished</div>
    </div>
    <button class="notification-close" id="notificationClose" aria-label="Dismiss">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Main app container -->
  <main class="app">
    <!-- Header -->
    <header class="app-header">
      <div class="brand">
        <div class="brand-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="13" r="8"/>
            <path d="M12 9v4l2 2"/>
            <path d="M5 3 2 6"/>
            <path d="m22 6-3-3"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>Nova</h1>
          <span>Timer</span>
        </div>
      </div>
      <div class="header-actions">
<button class="icon-btn" id="themeBtn" aria-label="Toggle theme" title="Switch to Morning">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <button class="icon-btn" id="addTimerBtn" aria-label="Add timer" title="Add new timer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Mode switcher -->
    <div class="mode-switcher" id="modeSwitcher" role="group" aria-label="Timer mode">
      <button class="mode-btn active" id="timerModeBtn" data-mode="timer">Timer</button>
      <button class="mode-btn" id="stopwatchModeBtn" data-mode="stopwatch">Stopwatch</button>
    </div>

    <!-- Timer tabs -->
    <div class="timer-tabs" id="timerTabs" role="tablist"></div>

    <!-- Circular timer display -->
    <section class="timer-display-wrap">
      <div class="timer-display" id="timerDisplay">
        <svg class="progress-ring" viewBox="0 0 300 300">
          <defs>
            <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#a855f7" />
              <stop offset="50%" stop-color="#6366f1" />
              <stop offset="100%" stop-color="#06b6d4" />
            </linearGradient>
            <filter id="glow">
              <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
              <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>
          <circle class="ring-track" cx="150" cy="150" r="135" />
          <circle class="ring-progress" cx="150" cy="150" r="135" filter="url(#glow)" />
        </svg>

        <div class="tick-marks" id="tickMarks"></div>

        <div class="time-content">
          <div class="time-display" id="timeDisplay">
            <span class="time-segment" data-unit="hours">
              <input type="text" class="time-input" id="hoursInput" value="00" maxlength="2" inputmode="numeric" aria-label="Hours" />
              <span class="time-label">hours</span>
            </span>
            <span class="time-colon">:</span>
            <span class="time-segment" data-unit="minutes">
              <input type="text" class="time-input" id="minutesInput" value="05" maxlength="2" inputmode="numeric" aria-label="Minutes" />
              <span class="time-label">min</span>
            </span>
            <span class="time-colon">:</span>
            <span class="time-segment" data-unit="seconds">
              <input type="text" class="time-input" id="secondsInput" value="00" maxlength="2" inputmode="numeric" aria-label="Seconds" />
              <span class="time-label">sec</span>
            </span>
          </div>
          <div class="status-pill" id="statusPill">
            <span class="status-dot"></span>
            <span class="status-text">Ready</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Quick presets -->
    <section class="presets" id="presets">
      <button class="preset-chip" data-seconds="60">1m</button>
      <button class="preset-chip" data-seconds="300">5m</button>
      <button class="preset-chip" data-seconds="600">10m</button>
      <button class="preset-chip" data-seconds="900">15m</button>
      <button class="preset-chip" data-seconds="1800">30m</button>
      <button class="preset-chip" data-seconds="3600">1h</button>
    </section>

    <!-- Controls -->
    <section class="controls">
      <button class="control-btn secondary" id="lapBtn" aria-label="Lap" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
        </svg>
        <span>Lap</span>
      </button>
      <button class="control-btn primary" id="startBtn" aria-label="Start timer">
        <span class="btn-content">
          <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
          <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="5" width="4" height="14" rx="1"/>
            <rect x="14" y="5" width="4" height="14" rx="1"/>
          </svg>
          <span class="btn-label">Start</span>
        </span>
      </button>
      <button class="control-btn secondary" id="resetBtn" aria-label="Reset timer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
        <span>Reset</span>
      </button>
    </section>

    <!-- Laps -->
    <section class="laps-section" id="lapsSection" hidden>
      <div class="laps-header">
        <h3>Laps</h3>
        <button class="text-btn" id="clearLapsBtn">Clear</button>
      </div>
      <div class="laps-list" id="lapsList"></div>
    </section>

    <!-- Keyboard hint -->
    <footer class="kbd-hint">
      <span><kbd>Space</kbd> Start/Pause</span>
      <span><kbd>R</kbd> Reset</span>
      <span><kbd>L</kbd> Lap</span>
      <span><kbd>N</kbd> New</span>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
